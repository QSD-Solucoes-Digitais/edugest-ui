<p-confirmDialog />

<div class="page-header">
  <div>
    <h1 class="page-title">Gestão de Usuários</h1>
    <p class="page-subtitle">Gerencie os acessos ao sistema</p>
  </div>
  <p-button label="Novo Usuário" icon="pi pi-plus" (onClick)="novoUsuario()" />
</div>

<div class="filters-card">
  <form [formGroup]="filtroForm" class="filters-row">
    <div class="filter-field">
      <label>Perfil</label>
      <p-select
        formControlName="perfil"
        [options]="opcioesPerfil"
        optionLabel="label"
        optionValue="value"
        placeholder="Todos os perfis"
        styleClass="w-full"
      />
    </div>
    <div class="filter-field">
      <label>Status</label>
      <p-select
        formControlName="ativo"
        [options]="opcoesStatus"
        optionLabel="label"
        optionValue="value"
        placeholder="Todos os status"
        styleClass="w-full"
      />
    </div>
    <div class="filter-actions">
      <p-button label="Filtrar" icon="pi pi-search" (onClick)="filtrar()" />
      <p-button label="Limpar" icon="pi pi-times" [outlined]="true" (onClick)="limparFiltros()" />
    </div>
  </form>
</div>

<p-table
  [value]="usuarios()"
  [lazy]="true"
  [loading]="carregando()"
  [totalRecords]="totalRegistros()"
  [rows]="rows()"
  [rowsPerPageOptions]="[10, 25, 50]"
  [paginator]="true"
  (onLazyLoad)="onCarregarDados($event)"
  stripedRows
>
  <ng-template pTemplate="header">
    <tr>
      <th>Nome</th>
      <th>E-mail</th>
      <th>Perfil</th>
      <th>Status</th>
      <th>Criado em</th>
      <th style="width: 7rem">Ações</th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-usuario>
    <tr>
      <td class="nome-cell">
        <div class="user-info">
          <div class="user-avatar">{{ usuario.nome.charAt(0).toUpperCase() }}</div>
          <span>{{ usuario.nome }}</span>
        </div>
      </td>
      <td class="email-cell">{{ usuario.login }}</td>
      <td>
        <p-tag
          [value]="labelPerfil(usuario.perfil)"
          [severity]="severidadePerfil(usuario.perfil)"
        />
      </td>
      <td>
        <p-tag
          [value]="usuario.ativo ? 'Ativo' : 'Inativo'"
          [severity]="usuario.ativo ? 'success' : 'danger'"
        />
      </td>
      <td class="date-cell">{{ usuario.criadoEm | date: 'dd/MM/yyyy HH:mm' }}</td>
      <td>
        <div class="actions-cell">
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            size="small"
            severity="secondary"
            pTooltip="Editar"
            tooltipPosition="top"
            (onClick)="editarUsuario(usuario)"
          />
          @if (usuario.ativo) {
            <p-button
              icon="pi pi-ban"
              [rounded]="true"
              [text]="true"
              size="small"
              severity="danger"
              pTooltip="Inativar"
              tooltipPosition="top"
              (onClick)="confirmarInativacao(usuario)"
            />
          }
        </div>
      </td>
    </tr>
  </ng-template>

  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="6">
        <div class="empty-state">
          <i class="pi pi-users"></i>
          <span>Nenhum usuário encontrado</span>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
