<p-toast />
<div class="auth-layout">
  <div class="painel-marca">
    <app-auth-painel-marca />
  </div>

  <div class="painel-form">
    <div class="form-wrapper">
      <h2>Bem-vindo de volta</h2>
      <p class="form-subtitle">Faça login para acessar o sistema</p>

      @if (erro()) {
        <p-message severity="error" [text]="erro()!" styleClass="w-full mb-3" />
      }

      <form [formGroup]="form" (ngSubmit)="entrar()" class="login-form">
        <div class="field">
          <label for="login">Usuário</label>
          <p-iconfield class="w-full">
            <p-inputicon class="pi pi-envelope" />
            <input
              pInputText
              id="login"
              formControlName="login"
              placeholder="Seu e-mail ou usuário"
              class="w-full"
              [class.ng-invalid]="loginInvalido"
              [class.ng-dirty]="loginInvalido"
            />
          </p-iconfield>
          @if (loginInvalido) {
            <small class="field-error">{{ erroLogin }}</small>
          }
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <p-password
            inputId="senha"
            formControlName="senha"
            placeholder="Sua senha"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            [invalid]="senhaInvalida"
          />
          @if (senhaInvalida) {
            <small class="field-error">{{ erroSenha }}</small>
          }
        </div>

        <div class="forgot-password">
          <a routerLink="/recuperar-senha">Esqueci minha senha</a>
        </div>

        <p-button
          type="submit"
          label="Entrar"
          icon="pi pi-sign-in"
          [loading]="carregando()"
          [disabled]="form.invalid || carregando()"
          styleClass="w-full mt-2"
        />
      </form>
    </div>
  </div>
</div>
